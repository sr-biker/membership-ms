server:
  port: 8080

spring:
  application:
    name: membership
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:membership}
    username: ${DB_USERNAME:membership}
    password: ${DB_PASSWORD:membership}
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        # Liveness must never depend on downstream deps (e.g. Postgres) — otherwise a DB
        # outage causes Kubernetes to kill and restart otherwise-healthy pods.
        liveness:
          include: livenessState
        # Readiness does depend on the DB — take the pod out of the Service's endpoints
        # while Postgres is unreachable, rather than serving requests that will fail.
        readiness:
          include: readinessState,db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
