replicaCount: 2

image:
  repository: 605448157849.dkr.ecr.us-east-1.amazonaws.com/membership
  tag: 174dadf0
  pullPolicy: IfNotPresent
  # Refreshed periodically by a CronJob (templates/ecr-registry-refresh-cronjob.yaml) --
  # ECR auth tokens expire after ~12h.
  pullSecretName: ecr-registry

environment: prod
springProfile: prod

ingress:
  enabled: true
  # Path-scoped rather than catch-all "/" -- contacts-micro-service already owns "/" on
  # the shared ingress controller/host. This matches the app's own controller mapping
  # (/api/memberships), so no rewrite-target annotation is needed.
  path: /api/memberships

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    # "1" not "1000m" -- the API server canonicalizes whole-number millicores to "1" on
    # write, so "1000m" here would make Argo CD's diff perpetually see this field as
    # OutOfSync (live value never matches the literal desired string).
    cpu: "1"
    memory: 768Mi

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3

# host/port/name are plain (never secret); username/password are fetched at container
# startup (dbSecretFetch below), not via a k8s Secret at all. Reuses
# contacts-micro-service's RDS instance (infra-prod-rds-postgres) -- separate database
# on the same instance, not a separate instance -- the "membership" database must exist
# on it before this deploys (see the one-time psql step run over SSM).
db:
  host: infra-prod-rds-postgres.cmx2qymsqgue.us-east-1.rds.amazonaws.com
  port: "5432"
  name: membership

ecrRefresh:
  enabled: true
  region: us-east-1
  registry: 605448157849.dkr.ecr.us-east-1.amazonaws.com
  secretName: ecr-registry

dbSecretFetch:
  enabled: true
  # Secrets Manager secret name (not ARN) -- must match a node IAM policy scoped to it
  # (see modules/k8s-nodes' db_secret_read policy pattern in the infra repo).
  secretName: /rds/postgres/credentials
  region: us-east-1

# Same Keycloak Service DNS as local -- senthil-auth namespace, both clusters run the same
# chart (see infra's helm/keycloak).
security:
  enabled: true
  issuerUri: http://keycloak.senthil-auth.svc.cluster.local:8080/realms/apps
