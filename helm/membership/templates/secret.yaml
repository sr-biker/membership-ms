{{- if and (not .Values.db.existingSecret) (not .Values.dbSecretFetch.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "membership.secretName" . }}
  labels:
    {{- include "membership.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_HOST: {{ .Values.db.host | quote }}
  DB_PORT: {{ .Values.db.port | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  DB_USERNAME: {{ .Values.db.username | quote }}
  DB_PASSWORD: {{ .Values.db.password | quote }}
{{- end }}
