services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: membership
      POSTGRES_USER: membership
      POSTGRES_PASSWORD: membership
    ports:
      - "5432:5432"
    volumes:
      - membership-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membership -d membership"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: membership
      DB_USERNAME: membership
      DB_PASSWORD: membership
    depends_on:
      db:
        condition: service_healthy

volumes:
  membership-db-data:
